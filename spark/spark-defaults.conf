# ─────────────────────────────────────────────────────────────────────────────
# Spark defaults: Iceberg REST catalog + MinIO S3A
# Used by both the long-running spark-iceberg service (HiveServer2)
# and the one-shot spark-sql-demo container.
# ─────────────────────────────────────────────────────────────────────────────

# Iceberg extensions (MERGE INTO, time-travel, etc.)
spark.sql.extensions                                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Primary catalog – "demo" namespace maps to the REST catalog
spark.sql.catalog.core                              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.core.type                         rest
spark.sql.catalog.core.uri                          http://rest:8181
spark.sql.catalog.core.io-impl                      org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.core.s3.endpoint                  http://minio:9000
spark.sql.catalog.core.warehouse                    s3a://warehouse/

# "core" catalog alias – used by the demo SQL (core.target_table, etc.)
spark.sql.catalog.core                              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.core.type                         rest
spark.sql.catalog.core.uri                          http://rest:8181
spark.sql.catalog.core.io-impl                      org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.core.s3.endpoint                  http://minio:9000
spark.sql.catalog.core.warehouse                    s3a://warehouse/
spark.sql.catalog.core.default-namespace            core

# Default catalog used by spark-sql / Hive JDBC sessions
spark.sql.defaultCatalog                            core

# Hive session catalog (keeps SHOW DATABASES working)
spark.sql.catalog.spark_catalog                     org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type                hive

# S3A / MinIO settings
spark.hadoop.fs.s3a.endpoint                        http://minio:9000
spark.hadoop.fs.s3a.access.key                      admin
spark.hadoop.fs.s3a.secret.key                      password
spark.hadoop.fs.s3a.path.style.access               true
spark.hadoop.fs.s3a.impl                            org.apache.hadoop.fs.s3a.S3AFileSystem

# Reduce noise in demo output
spark.sql.adaptive.enabled                          true